---
- name: Install build and release tooling
  hosts: all
  gather_facts: true
  tasks:
    - name: Install system packages needed for Rust builds
      ansible.builtin.apt:
        name:
          - build-essential
          - ca-certificates
          - curl
          - libssl-dev
          - pkg-config
        state: present
        update_cache: true
      become: true
      tags:
        - dev-tool
        - action:ci
        - action:release

    - name: Install rustup and cargo
      ansible.builtin.shell: |
        set -euo pipefail
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      args:
        executable: /bin/bash
        creates: "{{ ansible_env.HOME }}/.cargo/bin/cargo"
      tags:
        - dev-tool
        - action:ci
        - action:release

    - name: Install GitHub CLI
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: true
      become: true
      tags:
        - dev-tool
        - action:release

    - name: Install Node.js and npm for Codex CLI
      ansible.builtin.apt:
        name:
          - nodejs
          - npm
        state: present
        update_cache: true
      become: true
      tags:
        - dev-tool

    - name: Install Codex CLI
      ansible.builtin.npm:
        name: "@openai/codex"
        global: true
        state: present
      become: true
      tags:
        - dev-tool
