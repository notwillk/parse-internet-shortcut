---
- name: Install build and release tooling
  hosts: all
  gather_facts: true
  tasks:
    - name: Install system packages needed for Rust builds
      ansible.builtin.apt:
        name:
          - build-essential
          - ca-certificates
          - curl
          - libssl-dev
          - pkg-config
        state: present
        update_cache: true
      become: true
      tags:
        - dev-tool
        - action:ci
        - action:release

    - name: Install rustup and cargo
      ansible.builtin.shell: |
        set -euo pipefail
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      args:
        executable: /bin/bash
        creates: "{{ ansible_env.HOME }}/.cargo/bin/cargo"
      tags:
        - dev-tool
        - action:ci
        - action:release

    - name: Ensure apt keyrings directory exists for GitHub CLI repo key
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      become: true
      tags:
        - dev-tool
        - action:release

    - name: Install GitHub CLI apt repository key
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        mode: "0644"
      become: true
      tags:
        - dev-tool
        - action:release

    - name: Configure GitHub CLI apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        filename: github-cli
        state: present
      become: true
      tags:
        - dev-tool
        - action:release

    - name: Install GitHub CLI
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: true
      become: true
      tags:
        - dev-tool
        - action:release

    - name: Install Node.js and npm for Codex CLI
      ansible.builtin.apt:
        name:
          - nodejs
          - npm
        state: present
        update_cache: true
      become: true
      tags:
        - dev-tool

    - name: Install Codex CLI
      ansible.builtin.npm:
        name: "@openai/codex"
        global: true
        state: present
      become: true
      tags:
        - dev-tool
